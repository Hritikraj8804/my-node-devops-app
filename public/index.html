<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevOps Dashboard - v1.0.0</title>
    <!-- Import Premium Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="background-glow"></div>

<div class="container">
    <header class="app-header">
        <div class="badge">Version 1.0.0</div>
        <h1>DevOps Dashboard</h1>
        <p class="subtitle">A containerized Node.js application deployed using modern GitOps & CI/CD workflows.</p>
    </header>

    <div class="cards">
        <div class="card">
            <div class="card-icon">⚡</div>
            <h3>Backend</h3>
            <p>Node.js & Express</p>
        </div>

        <div class="card">
            <div class="card-icon">🐳</div>
            <h3>Containerized</h3>
            <p>Docker Engine Ready</p>
        </div>

        <div class="card">
            <div class="card-icon">☁️</div>
            <h3>Cloud Host</h3>
            <p>AWS EC2 Server</p>
        </div>

        <div class="card">
            <div class="card-icon">🔄</div>
            <h3>Automation</h3>
            <p>GitHub Actions Pipeline</p>
        </div>
    </div>

    <div class="action-section">
        <button id="status-btn" onclick="showStatus()">
            <span class="btn-text">Run System Check</span>
            <span class="spinner"></span>
        </button>
        <div id="status-container">
            <p id="status"></p>
        </div>
    </div>
</div>

<script>
function showStatus() {
    const btn = document.getElementById("status-btn");
    const statusText = document.getElementById("status");
    
    btn.classList.add("loading");
    statusText.className = "";
    statusText.innerHTML = "";
    
    setTimeout(() => {
        btn.classList.remove("loading");
        statusText.classList.add("success");
        statusText.innerHTML = "✨ v1.0.0: All systems nominal. Service running successfully!";
    }, 1200);
}
</script>

</body>
</html>
